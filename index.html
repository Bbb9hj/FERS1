        lucide.createIcons();
      });

      // وظيفة تصفية وعرض المعروضات والمنتجات على الشاشة مع مؤثرات حياكة سلسة
      function renderServices() {
        const container = document.getElementById('services-container');
        const noResults = document.getElementById('no-results');
        container.innerHTML = '';

        const filtered = SERVICES.filter(service => {
          const matchesCategory = activeCategory === 'all' || service.category === activeCategory;
          const matchesSearch = service.title.toLowerCase().includes(currentQuery.toLowerCase()) || 
                                service.description.toLowerCase().includes(currentQuery.toLowerCase());
          return matchesCategory && matchesSearch;
        });

        document.getElementById('service-count').textContent = `${filtered.length} خدمة`;

        if (filtered.length === 0) {
          noResults.classList.remove('hidden');
        } else {
          noResults.classList.add('hidden');
          
          filtered.forEach((service, index) => {
            const card = document.createElement('div');
            card.className = "bg-white p-4 rounded-3xl shadow-sm border border-slate-100 flex items-center gap-4 cursor-pointer hover:shadow-md hover:border-blue-100 transition-all group scale-100 active:scale-95 duration-150 animate-fade-in";
            card.style.animationDelay = `${index * 40}ms`;
            card.setAttribute('onclick', `openDrawer('${service.id}')`);
            
            card.innerHTML = `
              <div class="w-14 h-14 ${service.color} rounded-2xl flex items-center justify-center text-white shadow-inner shrink-0 group-hover:scale-110 transition-transform">
                <i data-lucide="${service.icon}" class="w-7 h-7"></i>
              </div>
              <div class="flex-1 min-w-0">
                <h3 class="font-bold text-slate-800 text-sm md:text-base truncate leading-tight mb-1">${service.title}</h3>
                <p class="text-xs text-slate-500 line-clamp-1 leading-normal">${service.description}</p>
              </div>
              <div class="w-8 h-8 bg-slate-50 rounded-full flex items-center justify-center text-slate-400 group-hover:bg-blue-50 group-hover:text-blue-600 transition-colors">
                <i data-lucide="chevron-left" class="w-5 h-5"></i>
              </div>
            `;
            container.appendChild(card);
          });
          
          // تحديث وتثبيت الأيقونات المتطابقة لحظياً
          lucide.createIcons();
        }
      }

      // مسك مدخل البحث وقص الأطراف الزائدة وتحديث الواجهة
      function handleSearch(val) {
        currentQuery = val.trim();
        renderServices();
      }

      // معالج اختيار وتبديل فئات الخدمات بالكامل
      function filterCategory(catId) {
        activeCategory = catId;
        
        const btnAll = document.getElementById('cat-all');
        const btnTg = document.getElementById('cat-telegram');
        const btnAi = document.getElementById('cat-ai');
        const btnFin = document.getElementById('cat-financial');

        const buttons = [btnAll, btnTg, btnAi, btnFin];
        buttons.forEach(btn => {
          if (btn) {
            btn.className = "flex-1 min-w-[85px] py-3 px-2 rounded-2xl flex flex-col items-center gap-1.5 transition-all bg-transparent text-slate-500 hover:bg-slate-50";
          }
        });

        const selectedBtn = document.getElementById(`cat-${catId}`);
        if (selectedBtn) {
          selectedBtn.className = "flex-1 min-w-[85px] py-3 px-2 rounded-2xl flex flex-col items-center gap-1.5 transition-all bg-blue-600 text-white shadow-lg shadow-blue-200";
        }

        renderServices();
      }

      // فتح بطاقة تفاصيل الخدمة المنزلقة من الأسفل (محفظة جيب كلاس)
      function openDrawer(serviceId) {
        const service = SERVICES.find(s => s.id === serviceId);
        if (!service) return;

        const iconContainer = document.getElementById('drawer-icon-container');
        iconContainer.className = `w-20 h-20 ${service.color} rounded-[28px] flex items-center justify-center text-white shadow-xl rotate-3 transition-transform`;
        
        const iconElement = document.getElementById('drawer-icon');
        iconElement.setAttribute('data-lucide', service.icon);

        const categoryBadge = document.getElementById('drawer-category');
        let categoryName = "عام";
        if (service.category === 'telegram') categoryName = "خدمات تيليجرام";
        if (service.category === 'ai') categoryName = "ذكاء اصطناعي وتصميم";
        if (service.category === 'financial') categoryName = "خدمات عامة ومالية";
        categoryBadge.textContent = categoryName;

        document.getElementById('drawer-title').textContent = service.title;
        document.getElementById('drawer-desc').textContent = service.description;

        const detailsBtn = document.getElementById('drawer-btn-details');
        if (service.detailsLink) {
          detailsBtn.classList.remove('hidden');
          detailsBtn.setAttribute('onclick', `window.open('${service.detailsLink}', '_blank')`);
        } else {
          detailsBtn.classList.add('hidden');
        }

        const orderBtn = document.getElementById('drawer-btn-order');
        if (service.orderLink) {
          orderBtn.setAttribute('onclick', `window.open('${service.orderLink}', '_blank')`);
          orderBtn.innerHTML = `<i data-lucide="send" class="w-5 h-5"></i><span>اطلب الخدمة الآن</span>`;
        }

        const overlay = document.getElementById('drawer-overlay');
        const drawer = document.getElementById('drawer');

        overlay.classList.remove('hidden');
        drawer.classList.remove('hidden');
        
        setTimeout(() => {
          drawer.classList.remove('translate-y-full');
          drawer.classList.add('translate-y-0');
        }, 10);

        lucide.createIcons();
      }

      // إغلاق بطاقة المحفظة بسلاسة بالغة لإرجاعها إلى الجزء السفلي غير المرئي
      function closeDrawer() {
        const overlay = document.getElementById('drawer-overlay');
        const drawer = document.getElementById('drawer');

        drawer.classList.remove('translate-y-0');
        drawer.classList.add('translate-y-full');
        overlay.classList.add('hidden');

        setTimeout(() => {
          drawer.classList.add('hidden');
        }, 300);
      }
    </script>
  </body>
</html>
